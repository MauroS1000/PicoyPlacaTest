name: CI/CD DevSecOps Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:
  # 1. ETAPA DE BUILD Y PRUEBAS
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compilar y Probar el Backend (Spring Boot)
        run: |
          cd picoyplaca
          chmod +x mvnw
          ./mvnw clean test

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar Dependencias del Frontend (Angular)
        run: |
          cd pico-placa-frontend
          npm install

  # 2. INTEGRACIÓN DEVSECOPS: ANÁLISIS SAST (Herramienta 1 de Seguridad)
  security-sast:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      - name: Instalar Trivy de forma nativa
        run: |
          sudo apt-get update && sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Ejecutar escaneo estático sin dependencias externas
        run: |
          trivy fs --scanners misconfig,secret --skip-files picoyplaca/pom.xml --format table --output sast-report.txt .
          cat sast-report.txt

  # 3. GENERACIÓN DE ARTEFACTOS Y PUSH A DOCKER HUB
  package-and-push:
    needs: security-sast
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      # Sacamos el hash corto para reusarlo como tag
      - name: Definir variables de entorno
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

       #Blanco de autenticación en Docker Hub
      - name: Autenticación en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y Subir Imagen Docker - Backend
        uses: docker/build-push-action@v5
        with:
          context: ./picoyplaca
          push: true
          tags: |
            mauro101/picoyplaca-backend:${{ steps.vars.outputs.sha_short }}
            mauro101/picoyplaca-backend:latest

      - name: Construir y Subir Imagen Docker - Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./pico-placa-frontend
          push: true
          tags: |
            mauro101/picoyplaca-frontend:${{ steps.vars.outputs.sha_short }}
            mauro101/picoyplaca-frontend:latest

  # 4. ACTUALIZACIÓN GITOPS PARA ARGOCD
  gitops-update:
    needs: package-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar credenciales de Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Actualizar tags en los manifiestos de K8s
        run: |
          # Reemplaza cualquier tag viejo o el 'placeholder' por el hash corto generado en la etapa anterior
          sed -i "s|image: mauro101/picoyplaca-backend:.*|image: mauro101/picoyplaca-backend:${{ needs.package-and-push.outputs.sha_short }}|g" k8s/backend-k8s.yaml
          sed -i "s|image: mauro101/picoyplaca-frontend:.*|image: mauro101/picoyplaca-frontend:${{ needs.package-and-push.outputs.sha_short }}|g" k8s/frontend-k8s.yaml

      - name: Subir cambios al repositorio de Git
        run: |
          git add k8s/*.yaml
          # Solo hace commit si de verdad cambió el hash (evita romper el pipeline si redespliegas lo mismo)
          git diff-index --quiet HEAD || git commit -m "chore(gitops): actualizar imágenes al commit ${{ needs.package-and-push.outputs.sha_short }}"
          git push origin HEAD:${{ github.ref_name }}