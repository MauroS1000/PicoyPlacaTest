apiVersion: apps/v1
kind: Deployment
metadata:
  name: picoyplaca-backend
  labels:
    app: picoyplaca-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: picoyplaca-backend
  template:
    metadata:
      labels:
        app: picoyplaca-backend
    spec:
      containers:
      - name: backend
        image: mauro101/picoyplaca-backend:f1e3945
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: picoyplaca-backend-service
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: picoyplaca-backend