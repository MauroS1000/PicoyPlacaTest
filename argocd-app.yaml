apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: picoyplaca-sistema
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/MauroS1000/PicoyPlacaTest.git'
    targetRevision: HEAD
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: picoyplaca-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true